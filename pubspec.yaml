name: patient_crm
description: "NxClinQ — Premium Clinic Management Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.3

  # State Management
  provider: ^6.1.2

  # UI & Fonts
  google_fonts: ^6.2.1

  # Charts
  fl_chart: ^0.69.0

  # Persistence
  shared_preferences: ^2.5.4

  # Date formatting
  intl: ^0.19.0

  # Lottie animations
  lottie: ^3.1.2
  dio: ^5.9.2
  connectivity_plus: ^7.0.0
  pretty_dio_logger: ^1.4.0
  add_2_calendar: ^3.0.1
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
